version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: jukebox_db
    environment:
      POSTGRES_USER: jukebox
      POSTGRES_PASSWORD: jukebox
      POSTGRES_DB: jukebox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jukebox"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jukebox:latest
    container_name: jukebox_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
