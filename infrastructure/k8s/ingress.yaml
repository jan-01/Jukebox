apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jukebox-ingress
  namespace: jukebox
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jukebox.local
      secretName: jukebox-tls
  rules:
    - host: jukebox.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jukebox-service
                port:
                  number: 80
