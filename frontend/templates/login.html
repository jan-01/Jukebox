<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukeboxd – Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>

 <div class="glass-card">
    <h2>Jukeboxd Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="login-button">Login</button>
    <div style="margin-top: 16px;">
  <a href="/login/google" style="display:block; width:100%; padding:12px;
     background:white; color:#444; border-radius:10px; text-decoration:none;
     font-size:15px; text-align:center; font-weight:500;
     box-shadow: 0 2px 6px rgba(0,0,0,0.2);">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
         style="width:18px; vertical-align:middle; margin-right:8px;">
    Login with Google
  </a>
    </div>
    <!-- Link to signup page -->
    <a href="/signup" class="signup-link">Create a new account</a>

    <div id="error-msg" class="error"></div>
 </div>

    <script src="/static/login.js"></script>

</body>
</html>
